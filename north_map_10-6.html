<style>

header .count{background:var(--blue);border-radius:20px;padding:2px 10px;font-size:13px}
header .done-count{background:var(--done);border-radius:20px;padding:2px 10px;font-size:13px}
header .route-info{background:var(--route);border-radius:20px;padding:2px 10px;font-size:13px}
.editbtn{background:#36404d;color:#fff;border:1px solid #4b5563;border-radius:8px;padding:4px 10px;font-size:12.5px;cursor:pointer}
.editbtn.on{background:var(--edit);color:#1f2a37;border-color:var(--edit);font-weight:700}
.legend{display:flex;gap:13px;font-size:12px;align-items:center;margin-inline-start:auto;flex-wrap:wrap}
.legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-inline-end:4px;vertical-align:middle}
#editbar{display:none;background:var(--edit);color:#1f2a37;font-size:12.5px;font-weight:600;padding:5px 14px}#editbar.on{display:block}
#main{flex:1;display:flex;min-height:0}

.item{padding:10px 14px;border-bottom:1px solid #eef0f4;cursor:pointer;border-inline-start:4px solid transparent}
.item:hover{background:#f0f6ff}.item.active{background:#e1efff}
.item.done{background:#fff0f7;border-inline-start-color:var(--done)}
.item.done .name{text-decoration:line-through;text-decoration-color:var(--done)}
.item .top{display:flex;align-items:center;gap:8px}
.badge{color:#fff;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none}
.b-address{background:var(--blue)}.b-parcel{background:var(--green)}.b-approx{background:var(--orange)}.b-street{background:var(--orange)}
.item.done .badge{background:var(--done)!important}
.item .name{font-weight:600;color:var(--dark);font-size:14.5px;flex:1}
.chk{transform:scale(1.35);accent-color:var(--done);cursor:pointer;flex:none}
.item .meta{color:#475467;font-size:12.5px;margin:3px 0 2px 32px;line-height:1.55}
.tag{border-radius:5px;padding:1px 6px;font-size:11px;font-weight:600}
.tag.web{background:#e7f8ef;color:#027a48}.tag.src{background:#eef2f6;color:#475467}.tag.warn{background:#fff4e5;color:#b54708}
.tag.donep{background:var(--done);color:#fff}.tag.moved{background:#fff3bf;color:#915b00}
.note{color:#667085;font-size:11.5px;margin:4px 0 2px 32px;line-height:1.5}
.row-btns{margin:7px 0 1px 32px;display:flex;gap:7px;flex-wrap:wrap}
.waze-btn{display:inline-flex;align-items:center;gap:5px;background:var(--waze);color:#063;font-weight:700;text-decoration:none;border-radius:8px;padding:5px 11px;font-size:12.5px}
.mini{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px solid #d0d5dd;color:#475467;border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer}
.leaflet-popup-content{margin:10px 12px;direction:rtl;text-align:right;min-width:205px}
.pop-name{font-weight:700;font-size:15px;color:var(--dark)}.pop-line{color:#475467;font-size:12.5px;margin:4px 0}
.pop-waze{display:inline-flex;gap:6px;background:var(--waze);color:#063;font-weight:700;text-decoration:none;border-radius:8px;padding:6px 12px;font-size:13px;margin-top:4px}
.pop-done{display:flex;align-items:center;gap:8px;margin-top:8px;padding:7px 9px;border-radius:8px;background:#fbe9f3;cursor:pointer;font-weight:700;color:var(--done);font-size:13px;user-select:none}
.pop-done input{transform:scale(1.4);accent-color:var(--done);cursor:pointer}
.num-icon{color:#fff;border:2px solid #fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.45);position:relative}
.num-icon .v{position:absolute;top:-6px;inset-inline-end:-6px;background:#fff;color:var(--done);border-radius:50%;width:15px;height:15px;font-size:11px;display:flex;align-items:center;justify-content:center;border:1px solid var(--done)}
.num-icon.editing{box-shadow:0 0 0 3px var(--edit),0 1px 6px rgba(0,0,0,.5)}
#search{padding:5px 10px;border-radius:6px;border:none;font-size:13px;width:120px}
.toggles{display:flex;gap:9px;font-size:12px;color:#fff;align-items:center}.toggles label{display:flex;gap:4px;align-items:center;cursor:pointer}
.locbtn{background:#fff;width:34px;height:34px;border-radius:6px;box-shadow:0 1px 5px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;border:none}
.locbtn.active{background:var(--me);color:#fff}
@media(max-width:760px){#main{flex-direction:column}#list{width:100%;height:45%;border-top:1px solid #e3e6ec;order:2}#map{order:1;height:55%}.legend{display:none}}

      (s.note?'<div class="note">'+s.note+'</div>':'')+
      '<div class="row-btns"><a class="waze-btn" href="'+wz(p.lat,p.lon)+'" target="_blank" onclick="event.stopPropagation()">🧭 Waze</a>'+
        (hasCustom(s.n)?'<span class="mini" onclick="event.stopPropagation();resetPos('+s.n+')">↺ אפס מיקום</span>':'')+'</div>';
    const chk=div.querySelector('.chk');chk.addEventListener('click',ev=>{ev.stopPropagation();toggleDone(s.n,chk.checked);});
    div.onclick=()=>{const pp=eff(s);map.setView([pp.lat,pp.lon],16);sMark[s.n].openPopup();highlight(s.n);};
    list.appendChild(div);items[s.n]=div;});
  document.getElementById('count').textContent=shown+' אתרים';}
function highlight(n){document.querySelectorAll('.item').forEach(e=>e.classList.remove('active'));const el=items[n];if(el){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'});}}
document.getElementById('search').addEventListener('input',e=>render(e.target.value));
render();updateDoneCount();
</script></body></html>
